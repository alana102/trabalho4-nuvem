name: CI/CD To-Do

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------- Job 1: Construir imagem e testar ----------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar a construção da imagem Docker
        run: docker build -t todo-app:ci .

      - name: Executar os testes da aplicação
        run: docker run --rm todo-app:ci pytest

  # ---------- Job 2: Implantar na EC2 via SSH ----------
  deploy:
    needs: build-and-test          # Dependência: Só roda se o Job 1 passar
    if: github.ref == 'refs/heads/main'   # Condição: Apenas push direto na main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar a chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copiar o código para a EC2 (Excluindo .env de produção)
        run: |
          rsync -avz --delete --exclude='.git' --exclude='.env' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/todo-app/"

      - name: Reconstruir imagem local na EC2 e recarregar os contêineres
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd ~/todo-app && docker compose up -d --build"